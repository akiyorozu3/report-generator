<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業報告書ジェネレーター</title>
<style>
:root {
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555;
  --color-text-tertiary: #999;
  --color-text-info: #0066cc;
  --color-text-success: #1a7a3c;
  --color-text-warning: #8a5a00;
  --color-text-danger: #cc0000;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-background-info: #e8f0fe;
  --color-background-success: #e6f4ea;
  --color-background-warning: #fff8e1;
  --color-background-danger: #fce8e6;
  --color-border-primary: #aaa;
  --color-border-secondary: #ccc;
  --color-border-tertiary: #e0e0e0;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}
* { box-sizing: border-box; }
body { font-family: var(--font-sans); max-width: 680px; margin: 0 auto; padding: 20px 16px; background: #fafafa; color: var(--color-text-primary); }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { font-size: 12px; padding: 5px 13px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: none; color: var(--color-text-secondary); cursor: pointer; transition: all .15s; }
.tab.on { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
.pnl { display: none; }
.pnl.on { display: block; }
.slbl { font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--color-text-tertiary); margin: 0 0 8px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.field input, .field select { width: 100%; font-size: 13px; color: var(--color-text-primary); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 10px; outline: none; }
.field input:focus, .field select:focus { border-color: var(--color-border-primary); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.highlight-box { background: var(--color-background-warning); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px; }
.highlight-box .slbl { color: var(--color-text-warning); margin-bottom: 6px; }
.client-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.client-chip { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: none; color: var(--color-text-secondary); cursor: pointer; }
.client-chip.on { background: var(--color-background-info); color: var(--color-text-info); }
.client-chip.add { color: var(--color-text-tertiary); border-style: dashed; }
.task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.task-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; display: flex; gap: 8px; align-items: center; }
.task-name { flex: 2; font-size: 12px; color: var(--color-text-primary); }
.task-hours { flex: 1; font-size: 12px; color: var(--color-text-secondary); }
.task-type { flex: 1; font-size: 11px; color: var(--color-text-tertiary); }
.task-del { font-size: 11px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer; }
.task-del:hover { color: var(--color-text-danger); }
.add-btn { font-size: 12px; color: var(--color-text-info); background: none; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 12px; cursor: pointer; width: 100%; margin-bottom: 10px; }
.add-btn:hover { background: var(--color-background-info); }
.summary-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.summary-item { text-align: center; }
.summary-label { font-size: 10px; color: var(--color-text-tertiary); margin: 0 0 2px; }
.summary-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
.summary-val.over { color: var(--color-text-danger); }
.summary-val.ok { color: var(--color-text-success); }
.btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
.save-btn { font-size: 12px; color: var(--color-text-success); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 12px; cursor: pointer; }
.save-btn:hover { background: var(--color-background-success); }
.gen-btn { flex: 1; font-size: 13px; font-weight: 500; color: var(--color-background-primary); background: var(--color-text-primary); border: none; border-radius: var(--border-radius-md); padding: 9px 16px; cursor: pointer; }
.gen-btn:hover { opacity: .85; }
.gen-btn:disabled { opacity: .4; cursor: not-allowed; }
.loading { font-size: 12px; color: var(--color-text-tertiary); text-align: center; padding: 10px; display: none; }
.result-wrap { display: none; }
.result-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
.result-table th { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; text-align: left; padding: 5px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.result-table td { padding: 5px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; }
.result-table td input { width: 100%; border: none; background: none; font-size: 12px; color: var(--color-text-primary); padding: 0; outline: none; }
.result-table td input:focus { background: var(--color-background-secondary); border-radius: 4px; padding: 2px 4px; }
.result-table tr:last-child td { border-bottom: none; }
.action-row { display: flex; gap: 8px; margin-top: 8px; }
.action-btn { flex: 1; font-size: 12px; color: var(--color-text-info); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 12px; cursor: pointer; }
.action-btn:hover { background: var(--color-background-info); }
.dl-btn { flex: 1; font-size: 12px; font-weight: 500; color: #fff; background: var(--color-text-success); border: none; border-radius: var(--border-radius-md); padding: 7px 12px; cursor: pointer; }
.dl-btn:hover { opacity: .85; }
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); }
.history-item:hover { border-color: var(--color-border-secondary); }
.history-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
.history-meta { font-size: 11px; color: var(--color-text-tertiary); margin: 2px 0 0; }
.history-del { font-size: 11px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer; }
.history-del:hover { color: var(--color-text-danger); }
.reminder-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 10px; }
.reminder-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.toggle { position: relative; width: 32px; height: 18px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--color-border-secondary); border-radius: 9px; transition: .2s; }
.toggle input:checked + .toggle-slider { background: var(--color-text-success); }
.toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider:before { transform: translateX(14px); }
.info { background: var(--color-background-info); border-radius: var(--border-radius-md); padding: 9px 12px; font-size: 11px; color: var(--color-text-info); line-height: 1.6; margin-bottom: 10px; }
.empty { text-align: center; padding: 24px; font-size: 12px; color: var(--color-text-tertiary); }
hr.d { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 12px 0; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab on" onclick="sw(0)">📝 報告書を作る</button>
  <button class="tab" onclick="sw(1)">📁 履歴</button>
  <button class="tab" onclick="sw(2)">🔔 リマインド</button>
</div>

<div class="pnl on" id="p0">
  <p class="slbl">クライアントを選ぶ</p>
  <div class="client-selector" id="client-selector"></div>
  <hr class="d">
  <div class="highlight-box">
    <p class="slbl">📅 今月の稼働情報</p>
    <div class="row3">
      <div class="field"><label>氏名</label><input type="text" id="name" placeholder="山田 太郎"></div>
      <div class="field"><label>対象月</label><input type="month" id="month"></div>
      <div class="field"><label>総稼働時間（h）</label><input type="number" id="total-hours" placeholder="160" min="1" onchange="updateSummary()"></div>
    </div>
    <div class="row2">
      <div class="field"><label>稼働日数（日）</label><input type="number" id="workdays" placeholder="20" min="1" max="31" onchange="updateSummary()"></div>
      <div class="field"><label>稼働パターン</label>
        <select id="pattern">
          <option value="weekday">平日メイン</option>
          <option value="flexible">フレキシブル</option>
          <option value="threeday">週3日ペース</option>
        </select>
      </div>
    </div>
  </div>
  <hr class="d">
  <p class="slbl">作業の種類と時間（わかっている分だけ入れる）</p>
  <div class="info">💡 合計が総稼働時間に足りない分は「その他作業」で自動補完。1日に複数の作業を組み合わせて割り振ります。</div>
  <div class="row3">
    <div class="field"><label>作業名</label><input type="text" id="t-name" placeholder="LP修正"></div>
    <div class="field"><label>合計時間（h）</label><input type="number" id="t-hours" placeholder="20" min="0.5" step="0.5" onchange="updateSummary()"></div>
    <div class="field"><label>種別</label>
      <select id="t-type">
        <option value="dev">開発・制作系</option>
        <option value="meeting">ミーティング</option>
        <option value="review">確認・レビュー</option>
        <option value="other">その他</option>
      </select>
    </div>
  </div>
  <button class="add-btn" onclick="addTask()">＋ 作業を追加</button>
  <div class="task-list" id="task-list"></div>
  <div class="summary-bar" id="summary-bar" style="display:none">
    <div class="summary-item"><p class="summary-label">総稼働時間</p><p class="summary-val" id="s-total">-</p></div>
    <div class="summary-item"><p class="summary-label">入力済み時間</p><p class="summary-val" id="s-input">-</p></div>
    <div class="summary-item"><p class="summary-label">その他で補完</p><p class="summary-val" id="s-other">-</p></div>
  </div>
  <div class="btn-row">
    <button class="save-btn" onclick="saveTemplate()">💾 保存</button>
    <button class="gen-btn" id="gen-btn" onclick="generate()" disabled>AIで報告書を生成する</button>
  </div>
  <div class="loading" id="loading">AIが1日ごとに割り振り中...</div>
  <div class="result-wrap" id="result-wrap">
    <hr class="d">
    <p class="slbl">生成された報告書（クリックして編集できます）</p>
    <table class="result-table">
      <thead><tr><th>日付</th><th>曜日</th><th>開始時間</th><th>終了時間</th><th>作業内容</th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
    <div id="adjust-notice" style="display:none;margin-bottom:8px"></div>
    <div class="action-row">
      <button class="action-btn" onclick="saveHistory()">📁 履歴に保存</button>
      <button class="action-btn" onclick="copyTSV()">シートにコピー</button>
      <button class="dl-btn" onclick="downloadExcel()">⬇️ Excelダウンロード</button>
    </div>
  </div>
</div>

<div class="pnl" id="p1">
  <p class="slbl">過去の報告書</p>
  <div id="history-list"><div class="empty">まだ履歴がありません</div></div>
</div>

<div class="pnl" id="p2">
  <p class="slbl">月末リマインド</p>
  <div class="info">💡 ブラウザの通知でお知らせします</div>
  <div class="reminder-box">
    <div class="reminder-row">
      <span style="font-size:13px;color:var(--color-text-primary)">月末3日前に通知</span>
      <label class="toggle"><input type="checkbox" id="remind-3" onchange="saveReminder()"><span class="toggle-slider"></span></label>
    </div>
    <p style="font-size:11px;color:var(--color-text-tertiary);margin:0">毎月28日ごろに通知</p>
  </div>
  <div class="reminder-box">
    <div class="reminder-row">
      <span style="font-size:13px;color:var(--color-text-primary)">月末当日に通知</span>
      <label class="toggle"><input type="checkbox" id="remind-1" onchange="saveReminder()"><span class="toggle-slider"></span></label>
    </div>
    <p style="font-size:11px;color:var(--color-text-tertiary);margin:0">月の最終日に通知</p>
  </div>
  <button class="add-btn" onclick="testNotification()">🔔 テスト通知を送る</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const typeLabel = { dev:'開発・制作系', meeting:'ミーティング', review:'確認・レビュー', other:'その他' };
let tasks = [], clients = [], currentClient = null;

const today = new Date();
document.getElementById('month').value = today.toISOString().slice(0,7);
document.getElementById('workdays').value = 20;
document.getElementById('total-hours').value = 160;

function sw(n) {
  document.querySelectorAll('.pnl').forEach((e,i) => e.classList.toggle('on', i===n));
  document.querySelectorAll('.tab').forEach((e,i) => e.classList.toggle('on', i===n));
  if (n===1) renderHistory();
}

function updateSummary() {
  const total = parseFloat(document.getElementById('total-hours').value) || 0;
  const inputted = tasks.reduce((s,t) => s+t.hours, 0);
  const other = Math.max(0, total - inputted);
  const bar = document.getElementById('summary-bar');
  if (total > 0) {
    bar.style.display = 'grid';
    document.getElementById('s-total').textContent = total + 'h';
    const inputEl = document.getElementById('s-input');
    inputEl.textContent = inputted + 'h';
    inputEl.className = 'summary-val' + (inputted > total ? ' over' : '');
    const otherEl = document.getElementById('s-other');
    otherEl.textContent = other.toFixed(1) + 'h';
    otherEl.className = 'summary-val' + (other === 0 ? ' ok' : '');
  } else {
    bar.style.display = 'none';
  }
  document.getElementById('gen-btn').disabled = (tasks.length === 0 && total === 0);
}

async function loadClients() {
  try { const r = await window.storage.get('clients'); if (r) clients = JSON.parse(r.value); } catch(e) {}
  if (!clients.length) { clients = [{ id:'default', name:'クライアントA' }]; await saveClients(); }
  currentClient = clients[0].id;
  renderClients();
  await loadTemplate();
}

async function saveClients() {
  try { await window.storage.set('clients', JSON.stringify(clients)); } catch(e) {}
}

function renderClients() {
  document.getElementById('client-selector').innerHTML =
    clients.map(c => `<button class="client-chip ${c.id===currentClient?'on':''}" onclick="selectClient('${c.id}')">${c.name}</button>`).join('') +
    `<button class="client-chip add" onclick="addClient()">＋ 追加</button>`;
}

async function selectClient(id) {
  currentClient = id; tasks = [];
  renderClients(); renderTasks(); updateSummary();
  document.getElementById('result-wrap').style.display = 'none';
  await loadTemplate();
}

async function addClient() {
  const name = prompt('クライアント名を入力してください');
  if (!name) return;
  const id = 'client_' + Date.now();
  clients.push({ id, name });
  await saveClients();
  currentClient = id; tasks = [];
  renderClients(); renderTasks(); updateSummary();
}

async function loadTemplate() {
  try {
    const r = await window.storage.get('template_' + currentClient);
    if (!r) return;
    const s = JSON.parse(r.value);
    if (s.name) document.getElementById('name').value = s.name;
    if (s.workdays) document.getElementById('workdays').value = s.workdays;
    if (s.totalHours) document.getElementById('total-hours').value = s.totalHours;
    if (s.pattern) document.getElementById('pattern').value = s.pattern;
    if (s.tasks?.length) { tasks = s.tasks; renderTasks(); }
    updateSummary();
  } catch(e) {}
}

async function saveTemplate() {
  try {
    await window.storage.set('template_' + currentClient, JSON.stringify({
      name: document.getElementById('name').value,
      workdays: document.getElementById('workdays').value,
      totalHours: document.getElementById('total-hours').value,
      pattern: document.getElementById('pattern').value,
      tasks
    }));
    const btn = document.querySelector('.save-btn');
    btn.textContent = '✓ 保存済み';
    setTimeout(() => btn.textContent = '💾 保存', 2000);
  } catch(e) { alert('保存に失敗しました'); }
}

function addTask() {
  const name = document.getElementById('t-name').value.trim();
  const hours = parseFloat(document.getElementById('t-hours').value);
  const type = document.getElementById('t-type').value;
  if (!name || !hours) { alert('作業名と時間を入力してください'); return; }
  tasks.push({ name, hours, type });
  renderTasks(); updateSummary();
  document.getElementById('t-name').value = '';
  document.getElementById('t-hours').value = '';
}

function removeTask(i) {
  tasks.splice(i, 1); renderTasks(); updateSummary();
}

function renderTasks() {
  document.getElementById('task-list').innerHTML = tasks.map((t,i) => `
    <div class="task-item">
      <span class="task-name">${t.name}</span>
      <span class="task-hours">${t.hours}h</span>
      <span class="task-type">${typeLabel[t.type]}</span>
      <button class="task-del" onclick="removeTask(${i})">削除</button>
    </div>`).join('');
}

function getDatesInMonth(yearMonth, workdays, pattern) {
  const [year, month] = yearMonth.split('-').map(Number);
  const allDays = [];
  const dim = new Date(year, month, 0).getDate();
  for (let d=1; d<=dim; d++) {
    const date = new Date(year, month-1, d);
    const dow = date.getDay();
    if (pattern==='weekday' && (dow===0||dow===6)) continue;
    if (pattern==='threeday' && dow!==1&&dow!==3&&dow!==5) continue;
    allDays.push(date);
  }
  return allDays.slice(0, workdays).sort((a,b) => a-b);
}

function getDow(date) { return ['日','月','火','水','木','金','土'][date.getDay()]; }

async function generate() {
  const name = document.getElementById('name').value || '担当者';
  const month = document.getElementById('month').value;
  const workdays = parseInt(document.getElementById('workdays').value) || 20;
  const totalHours = parseFloat(document.getElementById('total-hours').value) || 160;
  const pattern = document.getElementById('pattern').value;
  const inputtedHours = tasks.reduce((s,t) => s+t.hours, 0);
  const otherHours = Math.max(0, totalHours - inputtedHours);
  const btn = document.getElementById('gen-btn');

  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-wrap').style.display = 'none';

  const dates = getDatesInMonth(month, workdays, pattern);
  const avgHoursPerDay = (totalHours / workdays).toFixed(1);
  const allTasks = [...tasks];
  if (otherHours > 0) allTasks.push({ name: 'その他作業', hours: otherHours, type: 'other' });

  const prompt = `フリーランスの月次作業報告書を作成してください。

担当者：${name}
対象月：${month}
稼働日：${dates.map(d=>d.getDate()+'日').join('、')}
1日の平均稼働時間：${avgHoursPerDay}時間
総稼働時間：${totalHours}時間

作業の種類と月間合計時間：
${allTasks.map(t=>`・${t.name}（${typeLabel[t.type]}）：合計${t.hours}時間`).join('\n')}

以下のJSONのみ返してください。他の文字は一切含めないでください：
{"rows":[{"day":数字,"start":"9:00","end":"18:00","work":"作業内容（複数作業をカンマ区切り）"},...],"note":"補足があれば"}

重要なルール：
- 1日に必ず複数の作業を組み合わせること
- ミーティングだけの日はNG、必ず他の作業と組み合わせること
- 1日の稼働時間は${avgHoursPerDay}時間前後になるようにstart/endを設定
- 月間合計が総稼働時間${totalHours}時間に近くなるように調整
- workはビジネス日本語で自然な表現で`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 3000, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    const [year, mon] = month.split('-').map(Number);

    window._currentResult = { month, name, client: currentClient, rows: parsed.rows };

    document.getElementById('result-body').innerHTML = parsed.rows.map(row => {
      const date = new Date(year, mon-1, row.day);
      return `<tr>
        <td>${month.replace('-','/')}/${String(row.day).padStart(2,'0')}</td>
        <td>${getDow(date)}</td>
        <td><input value="${row.start||''}"></td>
        <td><input value="${row.end||''}"></td>
        <td><input value="${row.work}"></td>
      </tr>`;
    }).join('');

    const notice = document.getElementById('adjust-notice');
    if (parsed.note) {
      notice.style.display = 'block';
      notice.innerHTML = `<div style="background:var(--color-background-info);border-radius:var(--border-radius-md);padding:8px 12px;font-size:11px;color:var(--color-text-info)">${parsed.note}</div>`;
    } else { notice.style.display = 'none'; }

    document.getElementById('result-wrap').style.display = 'block';
  } catch(e) { alert('生成に失敗しました。もう一度お試しください。'); }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

function getTableRows() {
  return Array.from(document.querySelectorAll('#result-body tr')).map(tr => {
    const inputs = tr.querySelectorAll('input');
    const cells = tr.querySelectorAll('td');
    return { date: cells[0].textContent, dow: cells[1].textContent, start: inputs[0].value, end: inputs[1].value, work: inputs[2].value };
  });
}

function downloadExcel() {
  const month = document.getElementById('month').value;
  const name = document.getElementById('name').value || '担当者';
  const clientName = clients.find(c=>c.id===currentClient)?.name || 'クライアント';
  const rows = getTableRows();
  const wsData = [['日付','曜日','開始時間','終了時間','作業内容'], ...rows.map(r=>[r.date,r.dow,r.start,r.end,r.work])];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:12},{wch:6},{wch:10},{wch:10},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws, month);
  XLSX.writeFile(wb, `作業報告書_${clientName}_${month}_${name}.xlsx`);
}

function copyTSV() {
  const rows = getTableRows();
  const tsv = rows.map(r=>[r.date,r.dow,r.start,r.end,r.work].join('\t')).join('\n');
  navigator.clipboard.writeText(tsv).then(() => alert('コピーしました！'));
}

async function saveHistory() {
  if (!window._currentResult) return;
  const entry = { id: Date.now(), ...window._currentResult, rows: getTableRows(), savedAt: new Date().toLocaleDateString('ja-JP') };
  try {
    const r = await window.storage.get('history');
    const existing = r ? JSON.parse(r.value) : [];
    existing.unshift(entry);
    await window.storage.set('history', JSON.stringify(existing.slice(0,20)));
    const btn = event.target;
    btn.textContent = '✓ 保存しました';
    setTimeout(() => btn.textContent = '📁 履歴に保存', 2000);
  } catch(e) { alert('保存に失敗しました'); }
}

async function renderHistory() {
  try {
    const r = await window.storage.get('history');
    const list = r ? JSON.parse(r.value) : [];
    const el = document.getElementById('history-list');
    if (!list.length) { el.innerHTML = '<div class="empty">まだ履歴がありません</div>'; return; }
    el.innerHTML = '<div class="history-list">' + list.map(item => {
      const cName = clients.find(c=>c.id===item.client)?.name||'クライアント';
      return `<div class="history-item" onclick="loadHistory(${item.id})">
        <div><p class="history-title">${item.month} ${cName}</p><p class="history-meta">${item.name}・${item.rows?.length||0}日分・${item.savedAt}</p></div>
        <button class="history-del" onclick="event.stopPropagation();deleteHistory(${item.id})">削除</button>
      </div>`;
    }).join('') + '</div>';
  } catch(e) {}
}

async function loadHistory(id) {
  try {
    const r = await window.storage.get('history');
    const list = r ? JSON.parse(r.value) : [];
    const item = list.find(i=>i.id===id);
    if (!item) return;
    sw(0);
    document.getElementById('month').value = item.month;
    window._currentResult = item;
    document.getElementById('result-body').innerHTML = item.rows.map(row=>`
      <tr><td>${row.date}</td><td>${row.dow}</td>
      <td><input value="${row.start||''}"></td>
      <td><input value="${row.end||''}"></td>
      <td><input value="${row.work}"></td></tr>`).join('');
    document.getElementById('result-wrap').style.display = 'block';
    document.getElementById('adjust-notice').style.display = 'none';
  } catch(e) {}
}

async function deleteHistory(id) {
  try {
    const r = await window.storage.get('history');
    const list = r ? JSON.parse(r.value) : [];
    await window.storage.set('history', JSON.stringify(list.filter(i=>i.id!==id)));
    renderHistory();
  } catch(e) {}
}

async function loadReminder() {
  try {
    const r = await window.storage.get('reminder');
    if (!r) return;
    const s = JSON.parse(r.value);
    document.getElementById('remind-3').checked = s.remind3||false;
    document.getElementById('remind-1').checked = s.remind1||false;
  } catch(e) {}
  checkReminder();
}

async function saveReminder() {
  try { await window.storage.set('reminder', JSON.stringify({ remind3: document.getElementById('remind-3').checked, remind1: document.getElementById('remind-1').checked })); } catch(e) {}
}

function checkReminder() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const d = now.getDate();
  if (document.getElementById('remind-3').checked && lastDay-d<=3) sendNotification('📝 報告書の締め切りが近づいています', '月末まであと数日です！');
  if (document.getElementById('remind-1').checked && d===lastDay) sendNotification('📝 今日が報告書の締め切りです', '作業報告書を送りましょう！');
}

async function testNotification() {
  await sendNotification('🔔 リマインドテスト', '月末になったらこのように通知が届きます！');
}

async function sendNotification(title, body) {
  if (!('Notification' in window)) { alert('このブラウザは通知に対応していません'); return; }
  const perm = await Notification.requestPermission();
  if (perm==='granted') new Notification(title, { body });
  else alert('通知の許可が必要です');
}

// localStorageをwindow.storageに見立てたフォールバック
if (!window.storage) {
  window.storage = {
    get: async (key) => { const v = localStorage.getItem(key); return v ? { value: v } : null; },
    set: async (key, value) => { localStorage.setItem(key, value); return { value }; },
    delete: async (key) => { localStorage.removeItem(key); return { deleted: true }; }
  };
}

loadClients();
loadReminder();
</script>
